name: Build Docker

# Reusable workflow: assemble the linux-arm64 GenieX-CLI Docker image from
# the sdk-pkg-linux-arm64 artifact (cross-compiled upstream on x64) and an
# ARM64-native CLI binary built here. PR-time callers pass push=false to
# validate the image builds and loads; release-time callers pass push=true
# plus image_tags to push to GHCR.
#
# Runs on the self-hosted `linux-arm64` runner so the Go CLI is built
# natively — no cross-compile toolchain needed, and the resulting image
# loads and runs on the same machine for a smoke test.

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label (must be linux/arm64 native)"
        required: false
        type: string
        default: linux-arm64
      push:
        description: "Push the image to ghcr.io (release-time only)"
        required: false
        type: boolean
        default: false
      image_tags:
        description: "Newline-separated list of fully-qualified image tags. Required when push=true."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build-docker:
    name: build-docker
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version

      - name: Download linux-arm64 SDK artifact
        uses: actions/download-artifact@v5
        with:
          name: sdk-pkg-linux-arm64
          path: sdk/pkg-geniex/

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      # Native arm64 build — CGO picks up the host gcc + the SDK headers /
      # libs from the artifact. Binary is dropped directly into the Docker
      # context so `COPY geniex/ /opt/geniex/` finds it.
      - name: Build geniex CLI (linux-arm64 native)
        shell: bash
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: "-I${{ github.workspace }}/sdk/pkg-geniex/include"
          CGO_LDFLAGS: "-L${{ github.workspace }}/sdk/pkg-geniex/lib -lgeniex -Wl,-rpath,$ORIGIN"
          VERSION: ${{ steps.version.outputs.version }}
        working-directory: cli
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/docker-context/geniex"
          go build -trimpath \
            -ldflags "-X main.Version=${VERSION}" \
            -tags avx \
            -o "${{ github.workspace }}/docker-context/geniex/geniex" \
            ./cmd/geniex

      - name: Assemble Docker build context
        shell: bash
        run: |
          set -euo pipefail
          ctx="${{ github.workspace }}/docker-context"
          # Layout matches the Dockerfile's `COPY geniex/ /opt/geniex/`.
          # Binary is already in ${ctx}/geniex/geniex; ship the SDK shared
          # libraries next to it so the $ORIGIN rpath resolves them.
          cp -a sdk/pkg-geniex/lib/. "${ctx}/geniex/"
          cp cli/release/linux/Dockerfile "${ctx}/Dockerfile"
          echo "Context tree:"
          find "${ctx}" -maxdepth 3 -printf "  %p\n" | head -40

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate image_tags on push
        if: inputs.push
        shell: bash
        env:
          TAGS: ${{ inputs.image_tags }}
        run: |
          set -euo pipefail
          if [[ -z "${TAGS// }" ]]; then
            echo "::error::push=true requires a non-empty image_tags input."
            exit 1
          fi

      # Native arm64 runner → no QEMU, no --platform cross. PR path loads the
      # image into the local daemon; release path pushes straight to GHCR.
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ inputs.push && inputs.image_tags || format('geniex-cli:{0}', github.sha) }}
          provenance: false

      - name: Smoke test image (PR path only)
        if: ${{ !inputs.push }}
        shell: bash
        run: docker run --rm "geniex-cli:${{ github.sha }}" --help
