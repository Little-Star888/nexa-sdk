##
## Scorecard: Collect per-model performance via geniex Python API (on-demand)
##
name: "Scorecard: Single Model"

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model to benchmark"
        required: true
        type: choice
        default: "Llama-3.2-1B-Instruct"
        options:
          - Gemma-3-1B-it
          - Gemma-3-4B-it
          - Gemma-3n-E2B-it
          - Gemma-3n-E4B-it
          - Gemma-4-E4B-it
          - Gemma-4-E2B-it
          - Gemma-4-E2B-it-pure
          - Llama-3.1-8B-Instruct
          - Llama-3.2-1B-Instruct
          - Llama-3.2-3B-Instruct
          - Ministral-3B
          - OLMoE-1B-7B-0125
          - Qwen2-1.5B-Instruct
          - Qwen2.5-0.5B-Instruct
          - Qwen2.5-1.5B
          - Qwen2.5-3B-Instruct
          - Qwen2.5-7B-Instruct
          - Qwen2.5-Coder-1.5B-Instruct
          - Qwen2.5-Coder-3B-Instruct
          - Qwen2.5-Coder-7B-Instruct
          - Qwen3-0.6B
          - Qwen3-1.7B
          - Qwen3-4B
          - Qwen3-8B
          - Qwen3-14B
          - Qwen3.5-0.8B
          - Qwen3.5-2B
          - Qwen3.5-4B
          - Qwen3.5-9B
          - Qwen2.5-VL-3B-Instruct
          - Qwen2.5-VL-7B-Instruct
          - Qwen3-VL-2B-Instruct
          - Qwen3-VL-4B-Instruct
          - Qwen3-VL-8B-Instruct
          - gemma-3-270m-it
          - gemma-3-12b-it
          - phi-4-mini-instruct
          - Granite-4-Micro
          - GPT-OSS-20B
      device:
        description: "Target chipset (e.g. SM8750)"
        required: false
        type: string
        default: "SM8750"

jobs:
  run-scorecard:
    name: "Scorecard: ${{ inputs.model }} on ${{ inputs.device }}"
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install geniex
        run: pip install geniex PyYAML

      - name: Resolve model URLs
        id: model
        run: python3 scripts/qdc/resolve_model.py "${{ inputs.model }}" >> "$GITHUB_OUTPUT"

      - name: Run Scorecard
        run: |
          python3 scripts/qdc/scorecard.py \
            --model-url "${{ steps.model.outputs.url }}" \
            --mmproj-url "${{ steps.model.outputs.mmproj_url }}" \
            --device "${{ inputs.device }}" \
            --results-dir results/

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-${{ inputs.model }}-${{ inputs.device }}
          path: results/
